<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta
      name="description"
      content="TSY.Microglow 霓虹方塊俄羅斯小遊戲，支援桌機鍵盤與手機觸控。"
    >
    <title>霓虹方塊俄羅斯｜TSY.Microglow Games</title>
    <link rel="stylesheet" href="../../shared/base.css">
    <link rel="stylesheet" href="./tetris.css">
  </head>
  <body>
    <main class="tetris-shell">
      <header class="game-topbar">
        <nav class="return-nav" aria-label="返回連結">
          <a class="back-link compact-back" href="../../">回小遊戲大廳</a>
          <a class="portal-return" href="https://tsy3991.github.io/TSY.Microglow-Website/" data-portal-return>返回入口網站</a>
        </nav>
        <div>
          <p class="eyebrow">Neon Blocks</p>
          <h1>霓虹方塊俄羅斯</h1>
        </div>
        <div class="top-actions" aria-label="遊戲控制">
          <button type="button" data-action="sound" aria-pressed="true">音效開</button>
          <button type="button" data-action="gesture" aria-pressed="true">手勢開</button>
          <button type="button" data-action="pause">暫停</button>
          <button type="button" data-action="restart">重開</button>
        </div>
      </header>

      <section class="game-layout" aria-label="俄羅斯方塊遊戲區">
        <div class="board-wrap">
          <canvas id="gameBoard" width="300" height="600" aria-label="俄羅斯方塊主遊戲區"></canvas>
          <div class="game-overlay" data-overlay>
            <strong data-overlay-title>準備開始</strong>
            <span data-overlay-message>按開始、空白鍵或手機按鈕即可遊玩</span>
            <button type="button" data-action="start">開始遊戲</button>
          </div>
        </div>

        <aside class="game-panel" aria-label="分數與狀態">
          <div class="next-card">
            <span>下一顆</span>
            <canvas id="nextBoard" width="120" height="120" aria-label="下一顆方塊預覽"></canvas>
          </div>

          <div class="score-grid">
            <div>
              <span>分數</span>
              <strong data-score>0</strong>
            </div>
            <div>
              <span>最高分</span>
              <strong data-best>0</strong>
            </div>
            <div>
              <span>等級</span>
              <strong data-level>1</strong>
            </div>
            <div>
              <span>消行</span>
              <strong data-lines>0</strong>
            </div>
          </div>

          <div class="help-card">
            <h2>操作</h2>
            <p>鍵盤：左右移動、上鍵旋轉、下鍵加速、空白鍵硬降、P 暫停。</p>
            <p>手機：使用下方觸控按鈕移動、旋轉與落下。</p>
          </div>
        </aside>
      </section>

      <section class="touch-controls" aria-label="手機觸控控制">
        <button type="button" data-control="left">左</button>
        <button type="button" data-control="rotate">旋轉</button>
        <button type="button" data-control="right">右</button>
        <button type="button" data-control="down">加速</button>
        <button type="button" data-control="drop">落下</button>
      </section>
    </main>

    <script src="../../shared/portal-return.js"></script>
    <script src="../../shared/storage.js"></script>
    <script src="./tetris.js"></script>
  </body>
</html>
