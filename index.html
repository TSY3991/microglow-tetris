<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="TSY.Microglow 遊戲大廳，集中放置可在桌機與手機遊玩的輕量小遊戲。"
    >
    <title>TSY.Microglow 遊戲大廳</title>
    <link rel="stylesheet" href="./shared/base.css">
  </head>
  <body>
    <main class="lobby-shell">
      <header class="lobby-hero" aria-labelledby="page-title">
        <a class="back-link" href="https://tsy3991.github.io/TSY.Microglow-Website/" data-portal-return>回入口網站</a>
        <div class="hero-copy">
          <p class="eyebrow">Microglow Mini Games</p>
          <h1 id="page-title">遊戲大廳</h1>
          <p>
            這裡會集中放置未來所有小遊戲。入口網站只負責導流，遊戲在這個專案中獨立維護。
          </p>
        </div>
        <div class="hero-pixel" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </header>

      <section class="game-section" aria-labelledby="games-title">
        <div class="section-heading">
          <h2 id="games-title">可玩遊戲</h2>
          <span>本機最高分會存在你的瀏覽器中</span>
        </div>

        <div class="game-grid">
          <article class="game-card">
            <div class="game-thumb neon-blocks" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="game-card-copy">
              <p>方塊下落</p>
              <h3>霓虹方塊俄羅斯</h3>
              <span>科技感霓虹方塊搭配輕鬆可愛的操作節奏，支援鍵盤與手機觸控。</span>
            </div>
            <a class="primary-link" href="./games/tetris/">開始遊玩</a>
          </article>

          <article class="game-card">
            <div class="game-thumb snake-preview" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="game-card-copy">
              <p>微光蛇行</p>
              <h3>微光貪吃蛇</h3>
              <span>收集能量點、延長霓虹蛇身，支援方向鍵、WASD、手機按鈕與滑動操作。</span>
            </div>
            <a class="primary-link" href="./games/snake/">開始遊玩</a>
          </article>

          <article class="game-card">
            <div class="game-thumb downstairs-preview" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="game-card-copy">
              <p>下樓挑戰</p>
              <h3>小朋友下樓梯</h3>
              <span>左右移動踩住階梯，避開上方壓力並收集星星，支援鍵盤與手機觸控。</span>
            </div>
            <a class="primary-link" href="./games/downstairs/">開始遊玩</a>
          </article>

          <article class="game-card is-coming">
            <div class="game-thumb muted-thumb" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="game-card-copy">
              <p>準備中</p>
              <h3>下一款小遊戲</h3>
              <span>之後可加入貪食蛇、記憶翻牌、打字挑戰或節奏點擊。</span>
            </div>
            <span class="disabled-link">規劃中</span>
          </article>
        </div>
      </section>
    </main>
    <script src="./shared/portal-return.js"></script>
  </body>
</html>
